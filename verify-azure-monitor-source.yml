jobContext:
  otherProperties:
    # username = Application (client) ID from your App Registration
    # password = Client secret VALUE (shown once at creation time)
    sentinel_cred:
      username: "5c45b9fd-38c2-4431-917a-a880cdf7d34a"
      password: "<your-client-secret-here>"

  metricTags:
  dlqConfig:

dag:
  # Source: read rows from Log Analytics workspace using KQL.
  # Results are emitted as JSON objects, one per row.
  - id: "source"
    commandName: "azuremonitorsource"
    config:
      workspaceId: "c8bbf4ce-5902-4281-9241-91be9fb42ea4"
      tenantId: "71373c6f-eb1b-40bf-bcf4-19abdb2b9ca3"
      # Adjust the time range and table name as needed.
      # ZephflowTest2_CL is the table written by verify-microsoft-sentinel.yml.
      kqlQuery: "ZephflowTest2_CL | where TimeGenerated > ago(24h) | limit 10"
      credentialId: "sentinel_cred"
      batchSize: 100
    outputs:
      - "out"

  # Sink: print each row as a JSON object to stdout.
  - id: "out"
    commandName: "stdout"
    config:
      encodingType: "JSON_OBJECT"
