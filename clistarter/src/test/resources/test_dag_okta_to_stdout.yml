jobContext:
  otherProperties:
    # credentialId must match what's set in the oktasource config below.
    # For Okta, 'username' is unused — set any non-empty string.
    # 'password' is the SSWS API token from your Okta admin console.
    okta-creds:
      username: "unused"
      password: "YOUR_OKTA_SSWS_TOKEN_HERE"
  metricTags:
  dlqConfig:

dag:
  - id: "okta-source"
    commandName: "oktasource"
    config:
      # Your Okta org domain, e.g. "mycompany.okta.com"
      oktaDomain: "YOUR_OKTA_DOMAIN_HERE"
      credentialId: "okta-creds"
      # Optional: ISO 8601 timestamp to start fetching from.
      # Remove or leave blank to start from now.
      sinceTimestamp: "2025-01-01T00:00:00.000Z"
      # Optional: SCIM filter, e.g. eventType eq "user.session.start"
      # filter: ""
      limit: 100
    outputs:
      - "stdout-sink"

  - id: "stdout-sink"
    commandName: "stdout"
    config:
      encodingType: "JSON_OBJECT"
